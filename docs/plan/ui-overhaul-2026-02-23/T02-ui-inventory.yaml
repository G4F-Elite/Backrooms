  - Text rendering is centralized in src/menu.h (`drawText`, `drawTextCentered`, shader setup), then reused by all UI surfaces.
  - Gameplay and debug overlays are heavily co-located in src/hud.h, mixing player-facing and debug-only responsibilities.
